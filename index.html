<script>
let scheduleData = [
  {
    title: "Breakfast",
    symbol: "",
    stars:[false,false,false]
  }
];

let rewards = [
  { name:"iPad Time" },
  { name:"Sticker" }
];

function renderSchedule(){
  const container = document.getElementById("schedule");
  container.innerHTML = "";

  scheduleData.forEach((page,index)=>{
    const allStars = page.stars.every(s=>s);

    container.innerHTML += `
      <div class="bg-white m-6 p-6 rounded-3xl shadow-xl">
        <div class="flex justify-between items-center">
          <h2 class="text-4xl font-bold text-sky-700">${page.title}</h2>
          <button onclick="removePage(${index})" class="text-red-500 font-bold">Delete</button>
        </div>

        <div class="text-center mt-6">
          ${
            page.symbol
              ? `<img src="${page.symbol}" class="w-40 h-40 object-contain mx-auto">`
              : `<div class="text-gray-400">No symbol selected</div>`
          }
        </div>

        <div class="flex justify-center gap-6 mt-6">
          ${page.stars.map((filled,i)=>`
            <svg onclick="toggleStar(${index},${i})"
              viewBox="0 0 100 100"
              class="w-16 h-16 cursor-pointer">
              <polygon points="50,10 61,40 95,40 68,60 79,90 50,70 21,90 32,60 5,40 39,40"
                fill="${filled?'#fbbf24':'#cbd5e1'}"/>
            </svg>
          `).join("")}
        </div>

        <div class="text-center mt-8">
          ${rewards.map(r=>`
            <button onclick="chooseReward('${r.name}',${index})"
              ${allStars?'':'disabled'}
              class="m-2 px-6 py-3 rounded-xl text-lg font-bold
              ${allStars?'bg-emerald-500 text-white':'bg-gray-200 text-gray-400'}">
              ${r.name}
            </button>
          `).join("")}
        </div>
      </div>
    `;
  });
}

function toggleStar(pageIndex,starIndex){
  scheduleData[pageIndex].stars[starIndex] = true;
  renderSchedule();
}

function chooseReward(name,pageIndex){
  if(!scheduleData[pageIndex].stars.every(s=>s)) return;
  alert("You chose " + name + "!");
}

function addPage(){
  scheduleData.push({
    title:"New Event",
    symbol:"",
    stars:[false,false,false]
  });
  renderSchedule();
}

function removePage(index){
  scheduleData.splice(index,1);
  renderSchedule();
}

/* ---------- SYMBOL SEARCH FIXED ---------- */

async function searchSymbols(index){
  const query = document.getElementById("searchInput"+index).value.trim();
  const resultsContainer = document.getElementById("results"+index);

  if(!query){
    resultsContainer.innerHTML = "Enter a search term.";
    return;
  }

  resultsContainer.innerHTML = "Searching...";

  try{
    const openRes = await fetch(
      `https://www.opensymbols.org/api/v1/symbols/search?q=${encodeURIComponent(query)}&per_page=20`
    );
    const openData = await openRes.json();

    const globalRes = await fetch(
      `https://www.globalsymbols.com/api/v1/symbols/search?q=${encodeURIComponent(query)}&per_page=20`
    );
    const globalData = await globalRes.json();

    const openSymbols = openData.symbols || [];
    const globalSymbols = globalData.symbols || [];

    const combined = [...openSymbols, ...globalSymbols].slice(0,20);

    if(combined.length === 0){
      resultsContainer.innerHTML = "No symbols found.";
      return;
    }

    resultsContainer.innerHTML = "";

    combined.forEach(symbol=>{
      if(!symbol.image_url) return;

      const safeUrl = symbol.image_url.replace(/'/g,"%27");

      resultsContainer.innerHTML += `
        <div class="p-2 border rounded hover:bg-slate-100 cursor-pointer"
          onclick="selectSymbol(${index},'${safeUrl}')">
          <img src="${safeUrl}" class="w-20 h-20 object-contain mx-auto">
        </div>
      `;
    });

  }catch(err){
    console.error(err);
    resultsContainer.innerHTML = `
      <div class="text-red-500">
        Search failed. 
        This is likely a CORS restriction from OpenSymbols/GlobalSymbols on GitHub Pages.
      </div>
    `;
  }
}

function selectSymbol(index,url){
  scheduleData[index].symbol = url;
  renderSchedule();
}
</script>
