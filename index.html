<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Schedule</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    * { font-family: 'Nunito', sans-serif; }
    body { box-sizing: border-box; }

    .star-icon { transition: transform 0.3s ease; cursor: pointer; }
    .star-icon:hover { transform: scale(1.1); }
    .star-icon:active { transform: scale(0.95); }

    .star-filled { filter: drop-shadow(0 0 8px #fbbf24); }

    .reward-btn { transition: all 0.2s ease; }
    .reward-btn:not(:disabled):hover { transform: scale(1.02); }
    .reward-btn:not(:disabled):active { transform: scale(0.98); }
    .reward-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    @keyframes confetti-fall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .confetti {
      position: fixed;
      animation: confetti-fall 3s ease-out forwards;
    }

    @keyframes celebration-pop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .celebration-pop {
      animation: celebration-pop 0.4s ease-out forwards;
    }
  </style>
</head>

<body class="h-full bg-sky-50">

<div id="app" class="h-full w-full overflow-hidden">
  <div id="slide-container" class="h-full w-full relative"></div>

  <div id="celebration-overlay"
       class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-3xl p-12 text-center shadow-2xl max-w-lg mx-4">
      <div id="celebration-icon" class="text-8xl mb-6"></div>
      <h2 id="celebration-text"
          class="text-4xl font-extrabold text-emerald-600 mb-8"></h2>
      <button onclick="closeCelebration()"
              class="bg-emerald-500 hover:bg-emerald-600 text-white text-2xl font-bold py-4 px-12 rounded-2xl">
        Awesome ⭐
      </button>
    </div>
  </div>
</div>

<script>
const defaultConfig = {
  events: [
    "Breakfast", "Writing", "Morning Meeting",
    "English", "Recess", "Break",
    "Snack", "Math", "PE", "Music"
  ],
  rewards: ["iPad Time", "Sticker"]
};

let slideStates = {};
let currentSlide = 0;
const totalSlides = defaultConfig.events.length;

function initSlideStates() {
  for (let i = 0; i < totalSlides; i++) {
    slideStates[i] = { stars: [false, false, false] };
  }
}

const starGray = `
<svg viewBox="0 0 100 100" class="w-24 h-24 star-icon">
<polygon points="50,10 61,40 95,40 68,60 79,90 50,70 21,90 32,60 5,40 39,40"
fill="#cbd5e1"/>
</svg>`;

const starYellow = `
<svg viewBox="0 0 100 100" class="w-24 h-24 star-icon star-filled">
<polygon points="50,10 61,40 95,40 68,60 79,90 50,70 21,90 32,60 5,40 39,40"
fill="#fbbf24"/>
</svg>`;

function renderSlides() {
  const container = document.getElementById('slide-container');
  const eventTitle = defaultConfig.events[currentSlide];
  const state = slideStates[currentSlide];
  const allStars = state.stars.every(s => s);

  container.innerHTML = `
    <div class="absolute inset-0 p-6 flex flex-col">
      
      <div class="absolute top-4 right-4">
        <button onclick="nextSlide()"
          class="bg-white text-sky-600 font-bold py-3 px-6 rounded-xl shadow">
          Next Event →
        </button>
      </div>

      <div class="absolute top-4 left-4 bg-white px-4 py-2 rounded-full font-bold shadow">
        ${currentSlide + 1} of ${totalSlides}
      </div>

      <div class="flex-none text-center pt-16">
        <h1 class="text-5xl font-extrabold text-sky-800">${eventTitle}</h1>
      </div>

      <div class="flex-1 flex flex-col items-center justify-center">
        <div class="flex gap-6 mb-4">
          ${state.stars.map((filled, i) => `
            <div onclick="tapStar(${i})">
              ${filled ? starYellow : starGray}
            </div>
          `).join("")}
        </div>
        <p class="text-2xl font-bold text-sky-700">Earn 3 stars!</p>
      </div>

      <div class="text-center pb-10">
        ${defaultConfig.rewards.map(r => `
          <button
            onclick="chooseReward('${r}')"
            ${allStars ? "" : "disabled"}
            class="reward-btn bg-white rounded-2xl p-6 shadow-xl border-4
            ${allStars ? "border-emerald-400" : "border-gray-200"} m-3 text-2xl font-bold">
            ${r}
          </button>
        `).join("")}
      </div>

    </div>
  `;
}

function tapStar(index) {
  if (!slideStates[currentSlide].stars[index]) {
    slideStates[currentSlide].stars[index] = true;
    renderSlides();
  }
}

function nextSlide() {
  currentSlide = (currentSlide + 1) % totalSlides;
  renderSlides();
}

function chooseReward(name) {
  if (!slideStates[currentSlide].stars.every(s => s)) return;
  document.getElementById("celebration-text").textContent =
    "You chose " + name + "!";
  document.getElementById("celebration-overlay").classList.remove("hidden");
}

function closeCelebration() {
  document.getElementById("celebration-overlay").classList.add("hidden");
}

initSlideStates();
renderSlides();
</script>

</body>
</html>
